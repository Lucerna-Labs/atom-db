name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Test
        run: cargo test --all-targets
      - name: Lint
        run: cargo clippy --all-targets -- -D warnings
